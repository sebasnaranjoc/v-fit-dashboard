<div class="page-header">
  <div>
    <h1>Clientes</h1>
    <p class="subtitle">Base de clientes de la tienda</p>
  </div>
  <button mat-flat-button color="primary" (click)="nuevo()">
    <mat-icon>add</mat-icon>
    Nuevo cliente
  </button>
</div>

@if (loading()) {
  <mat-progress-bar mode="indeterminate" />
}

<div class="table-card">
  <table mat-table [dataSource]="clientes()" class="full-table">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let c">{{ c.id }}</td>
    </ng-container>

    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let c">{{ c.nombre }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let c">{{ c.email }}</td>
    </ng-container>

    <ng-container matColumnDef="telefono">
      <th mat-header-cell *matHeaderCellDef>Teléfono</th>
      <td mat-cell *matCellDef="let c">{{ c.telefono || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="creado_en">
      <th mat-header-cell *matHeaderCellDef>Registrado</th>
      <td mat-cell *matCellDef="let c">{{ c.creado_en | date: 'dd/MM/yyyy' }}</td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef class="col-actions">Acciones</th>
      <td mat-cell *matCellDef="let c" class="col-actions">
        <button mat-icon-button matTooltip="Editar" (click)="editar(c)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Eliminar" color="warn" (click)="eliminar(c)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>

  @if (!loading() && clientes().length === 0) {
    <div class="empty-state">
      <mat-icon>group</mat-icon>
      <p>No hay clientes registrados.</p>
    </div>
  }
</div>
