<div class="page-header">
  <div>
    <h1>Categorías</h1>
    <p class="subtitle">Organiza los productos de la tienda</p>
  </div>
  <button mat-flat-button color="primary" (click)="nueva()">
    <mat-icon>add</mat-icon>
    Nueva categoría
  </button>
</div>

@if (loading()) {
  <mat-progress-bar mode="indeterminate" />
}

<div class="table-card">
  <table mat-table [dataSource]="categorias()" class="full-table">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let c">{{ c.id }}</td>
    </ng-container>

    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let c">{{ c.nombre }}</td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef class="col-actions">Acciones</th>
      <td mat-cell *matCellDef="let c" class="col-actions">
        <button mat-icon-button matTooltip="Editar" (click)="editar(c)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Eliminar" color="warn" (click)="eliminar(c)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>

  @if (!loading() && categorias().length === 0) {
    <div class="empty-state">
      <mat-icon>category</mat-icon>
      <p>No hay categorías todavía.</p>
    </div>
  }
</div>
