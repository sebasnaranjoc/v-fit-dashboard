<div class="page-header">
  <div>
    <h1>Métodos de pago</h1>
    <p class="subtitle">Formas de pago aceptadas en la tienda</p>
  </div>
  <button mat-flat-button color="primary" (click)="nuevo()">
    <mat-icon>add</mat-icon>
    Nuevo método
  </button>
</div>

@if (loading()) {
  <mat-progress-bar mode="indeterminate" />
}

<div class="table-card">
  <table mat-table [dataSource]="metodos()" class="full-table">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let m">{{ m.id }}</td>
    </ng-container>

    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let m"><strong>{{ m.nombre }}</strong></td>
    </ng-container>

    <ng-container matColumnDef="activo">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let m">
        <span class="chip" [class.chip-activo]="m.activo" [class.chip-inactivo]="!m.activo">
          {{ m.activo ? 'Activo' : 'Inactivo' }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef class="col-actions">Acciones</th>
      <td mat-cell *matCellDef="let m" class="col-actions">
        <button mat-icon-button matTooltip="Editar" (click)="editar(m)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Eliminar" color="warn" (click)="eliminar(m)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>

  @if (!loading() && metodos().length === 0) {
    <div class="empty-state">
      <mat-icon>payments</mat-icon>
      <p>No hay métodos de pago.</p>
    </div>
  }
</div>
